services:
  db:
    image: postgis/postgis:17-3.5-alpine
    container_name: paraki_db
    environment:
      POSTGRES_DB: paraki
      POSTGRES_USER: mc_user
      POSTGRES_PASSWORD: mc_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc_user -d paraki"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paraki_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=paraki;Username=mc_user;Password=mc_dev_password
      - Cors__AllowedOrigins__0=${CORS_ORIGIN_0:-http://localhost:5001}
      - Cors__AllowedOrigins__1=${CORS_ORIGIN_1:-http://localhost:5001}
      - Jwt__Issuer=Paraki
      - Jwt__Audience=Paraki
      - Jwt__SecretKey=dev-homologacao-secret-key-minimo-32-chars!
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: paraki_frontend
    ports:
      - "5001:80"
    volumes:
      - ./src/Paraki.Frontend/wwwroot/appsettings.Local.json:/usr/share/nginx/html/appsettings.Local.json:ro
    depends_on:
      - api

volumes:
  postgres_data:
