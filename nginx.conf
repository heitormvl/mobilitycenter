events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API requests to the backend container
        location /api/ {
            proxy_pass         http://api:8080/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://api:8080/health;
        }

        location /scalar/ {
            proxy_pass http://api:8080/scalar/;
        }

        # appsettings files must never be cached (regenerated on each deploy)
        location ~* ^/appsettings.*\.json$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location ~* \.(js|css|wasm|dll|dat|json|png|jpg|svg|ico)$ {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
