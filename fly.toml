# fly.toml app configuration file generated for paraki-api on 2026-06-22T15:08:04-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'paraki-api'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'
  AzureStorage__StorageType = 'Local'
  AzureStorage__LocalPath = '/data/fotos'

[mounts]
  source = 'paraki_uploads'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
